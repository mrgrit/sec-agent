services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: secagent
      POSTGRES_USER: secagent
      POSTGRES_PASSWORD: secagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg2://secagent:secagent@db:5432/secagent
      REDIS_URL: redis://redis:6379/0
      APP_SECRET_KEY: "change-this-in-prod-32bytes-min"
      STORAGE_DIR: /data
      DEFAULT_LLM_TIMEOUT_S: "300"
    ports:
      - "8000:8000"
    volumes:
      - storage:/data
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg2://secagent:secagent@db:5432/secagent
      REDIS_URL: redis://redis:6379/0
      APP_SECRET_KEY: "change-this-in-prod-32bytes-min"
      STORAGE_DIR: /data
      DEFAULT_LLM_TIMEOUT_S: "600"
    command: ["bash", "-lc", "python -m app.worker.worker"]
    volumes:
      - storage:/data
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  storage:
